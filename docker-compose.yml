services:
  api:
    build:
      context: ./api
    ports:
      - "3002:3002"
    env_file:
      - ./api/.env
    environment:
      SQLITE_PATH: /app/data/demo.db
    volumes:
      - ./api/data:/app/data

  remote-a:
    build:
      context: ./remote-a
    ports:
      - "3001:3001"

  remote-b:
    build:
      context: ./remote-b
    ports:
      - "3003:3003"

  remote-vue:
    build:
      context: ./remote-vue
    ports:
      - "3004:3004"

  shell:
    build:
      context: ./shell
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
    ports:
      - "3000:3000"
    depends_on:
      - api
      - remote-a
      - remote-b
      - remote-vue
